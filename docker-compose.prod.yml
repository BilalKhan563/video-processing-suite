version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: video-processing-api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - WHISPER_MODEL_SIZE=${WHISPER_MODEL_SIZE:-tiny}
      - LOG_LEVEL=${LOG_LEVEL:-WARNING}
    volumes:
      - ./logs:/app/logs
      - whisper-cache:/root/.cache/whisper
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - video-network
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '2'
          memory: 4G

  nginx:
    image: nginx:alpine
    container_name: video-processing-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - video-network

volumes:
  whisper-cache:

networks:
  video-network:
    driver: bridge